# Netlify build & deploy config for the StockSense AI SPA.
#
# Build:
#   - Node 22, `npm ci`, `npm run build` → outputs to `dist/`
#
# SPA routing: every path that isn't a real file is rewritten to /index.html
# so React Router handles client-side routing.
#
# API: two options (choose one) — see ../README_NETLIFY.md.
#   1. Set VITE_API_BASE (build env) to your deployed API, e.g.
#      https://api.stocksense.app/api/v1  → frontend calls it directly
#      (ensure CORS allows your Netlify domain on the backend).
#   2. OR proxy /api/* to the backend at the edge by uncommenting the redirect
#      block below (replace the target URL with your HF Space URL). This avoids CORS.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback (React Router support)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# --- API Proxy to Hugging Face Space (uncomment & set your HF URL) ---
# Replace YOUR_USERNAME-YOUR_SPACE with your actual HF Space identifier.
# Example: https://aquanuit-stocksense-ai.hf.space/api/:splat
[[redirects]]
  from = "/api/*"
  to = "https://YOUR_USERNAME-YOUR_SPACE.hf.space/api/:splat"
  status = 200
  force = true
