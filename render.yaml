services:
  - type: web
    name: stocksense-ai
    env: python
    region: ohio
    plan: free
    buildCommand: "pip install -r requirements-hf.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENV
        value: prod
      - key: DATABASE_URL
        value: sqlite:///./stocksense.db
      - key: MAX_CONCURRENT_TRAINS
        value: 2
      - key: ML_MAX_TRAINING_ROWS
        value: 750
      - key: ML_DEFAULT_MODELS
        value: linear,random_forest
      - key: CORS_ORIGINS
        value: "https://your-netlify-site.netlify.app" # UPDATE THIS
